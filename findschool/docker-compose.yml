version: '3.8'

services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: GoSchool_db
    environment:
      POSTGRES_USER: ${DB_USER:-GoSchool_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-GoSchool}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - GoSchool_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U GoSchool_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: GoSchool_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - GoSchool_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: GoSchool_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-GoSchool_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-GoSchool}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-GoSchool_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      DB_NAME: ${DB_NAME:-GoSchool}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_change_in_production}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - GoSchool_network
    volumes:
      - ./backend/src:/app/src

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: GoSchool_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - GoSchool_network

volumes:
  postgres_data:
  redis_data:

networks:
  GoSchool_network:
    driver: bridge
